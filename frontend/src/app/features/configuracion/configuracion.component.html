<app-sidebar-layout>

  <div class="config-page">

    <div class="config-page__header">
      <h1 class="config-page__title">Configuración</h1>
      <p class="config-page__subtitle">Personaliza tu experiencia en TaskMaster.</p>
    </div>

    <div class="config-grid">

      <!-- ── Appearance ──────────────────────────── -->
      <div class="card config-card">
        <div class="config-card__head">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <h2 class="config-card__title">Apariencia</h2>
        </div>

        <!-- Theme -->
        <div class="config-section">
          <p class="config-label">Tema</p>
          <div class="theme-options">
            <button
              type="button"
              class="theme-option"
              [class.theme-option--active]="tema() === 'claro'"
              (click)="setTema('claro')"
            >
              <span class="theme-option__swatch theme-option__swatch--claro">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="5"/>
                  <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                  <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                </svg>
              </span>
              Claro
            </button>
            <button
              type="button"
              class="theme-option"
              [class.theme-option--active]="tema() === 'oscuro'"
              (click)="setTema('oscuro')"
            >
              <span class="theme-option__swatch theme-option__swatch--oscuro">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              </span>
              Oscuro
            </button>
            <button
              type="button"
              class="theme-option"
              [class.theme-option--active]="tema() === 'sistema'"
              (click)="setTema('sistema')"
            >
              <span class="theme-option__swatch theme-option__swatch--sistema">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
              </span>
              Sistema
            </button>
          </div>
        </div>

        <!-- Font size -->
        <div class="config-section">
          <p class="config-label">Tamaño de fuente</p>
          <div class="font-options">
            <button
              type="button"
              class="font-option"
              [class.font-option--active]="fontSize() === 'pequeno'"
              (click)="setFontSize('pequeno')"
            >A<span class="font-option__sub">Pequeño</span></button>
            <button
              type="button"
              class="font-option font-option--md"
              [class.font-option--active]="fontSize() === 'normal'"
              (click)="setFontSize('normal')"
            >A<span class="font-option__sub">Normal</span></button>
            <button
              type="button"
              class="font-option font-option--lg"
              [class.font-option--active]="fontSize() === 'grande'"
              (click)="setFontSize('grande')"
            >A<span class="font-option__sub">Grande</span></button>
          </div>
        </div>
      </div>

      <!-- ── General settings ────────────────────── -->
      <div class="card config-card">
        <div class="config-card__head">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <h2 class="config-card__title">General</h2>
        </div>

        <div class="config-field">
          <label class="config-field__label" for="idioma">Idioma</label>
          <div class="select-wrap">
            <select id="idioma" class="config-select" [ngModel]="idioma()" (ngModelChange)="idioma.set($event)" name="idioma">
              <option value="es">Español</option>
              <option value="en">English</option>
              <option value="fr">Français</option>
              <option value="pt">Português</option>
            </select>
            <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <div class="config-field">
          <label class="config-field__label" for="formatoFecha">Formato de fecha</label>
          <div class="select-wrap">
            <select id="formatoFecha" class="config-select" [ngModel]="formatoFecha()" (ngModelChange)="formatoFecha.set($event)" name="formatoFecha">
              <option value="DD/MM/AAAA">DD/MM/AAAA</option>
              <option value="MM/DD/AAAA">MM/DD/AAAA</option>
              <option value="AAAA-MM-DD">AAAA-MM-DD</option>
            </select>
            <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <div class="config-field">
          <label class="config-field__label" for="formatoHora">Formato de hora</label>
          <div class="select-wrap">
            <select id="formatoHora" class="config-select" [ngModel]="formatoHora()" (ngModelChange)="formatoHora.set($event)" name="formatoHora">
              <option value="24h">24 horas</option>
              <option value="12h">12 horas (AM/PM)</option>
            </select>
            <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <div class="config-field">
          <label class="config-field__label" for="zonaHoraria">Zona horaria</label>
          <div class="select-wrap">
            <select id="zonaHoraria" class="config-select" [ngModel]="zonaHoraria()" (ngModelChange)="zonaHoraria.set($event)" name="zonaHoraria">
              <option value="America/Bogota">América/Bogotá (UTC-5)</option>
              <option value="America/Mexico_City">América/Ciudad de México (UTC-6)</option>
              <option value="America/Lima">América/Lima (UTC-5)</option>
              <option value="America/Santiago">América/Santiago (UTC-3)</option>
              <option value="America/Buenos_Aires">América/Buenos Aires (UTC-3)</option>
              <option value="Europe/Madrid">Europa/Madrid (UTC+1/+2)</option>
              <option value="UTC">UTC</option>
            </select>
            <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <div class="config-actions">
          <button type="button" class="btn-save" [class.btn-save--ok]="saved" (click)="saveConfig()">
            <span *ngIf="!saved">Guardar configuración</span>
            <span *ngIf="saved">&#10003; Guardado</span>
          </button>
        </div>

      </div>
    </div>
  </div>

</app-sidebar-layout>
