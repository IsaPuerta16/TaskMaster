<footer class="footer">
  <div class="footer-content">
    <div class="footer-grid">
      <div class="footer-col footer-brand">
        <span class="footer-logo">TaskMaster</span>
        <p class="footer-tagline">{{ L().tagline }}</p>
      </div>
      <div class="footer-col">
        <h4 class="footer-heading">{{ L().nav }}</h4>
        <a routerLink="/">{{ L().home }}</a>
        <a routerLink="/funcionalidades">{{ L().features }}</a>
        <a routerLink="/productividad">{{ L().productivity }}</a>
        <a routerLink="/login">{{ L().login }}</a>
        <a routerLink="/register">{{ L().register }}</a>
      </div>
      <div class="footer-col">
        <h4 class="footer-heading">{{ L().contact }}</h4>
        <p>{{ L().contactLine }}</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>{{ L().copy }}</p>
    </div>
  </div>
</footer>
