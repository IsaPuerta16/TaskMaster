<div class="shell">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="sidebar__brand">
      <span class="sidebar__logo-badge">TM</span>
      <span class="sidebar__app-name">TaskMaster</span>
    </div>

    <div class="sidebar__avatar-block">
      <div class="sidebar__avatar">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="#252545"/>
          <ellipse cx="24" cy="26" rx="15" ry="18" fill="#ec4899"/>
          <circle cx="24" cy="22" r="11" fill="#fde8d8"/>
          <ellipse cx="24" cy="12" rx="13" ry="8" fill="#ec4899"/>
          <ellipse cx="11.5" cy="23" rx="4" ry="8" fill="#ec4899"/>
          <ellipse cx="36.5" cy="23" rx="4" ry="8" fill="#ec4899"/>
          <circle cx="20" cy="22" r="2" fill="#1a1a2e"/>
          <circle cx="28" cy="22" r="2" fill="#1a1a2e"/>
          <circle cx="20.8" cy="21.2" r="0.7" fill="white"/>
          <circle cx="28.8" cy="21.2" r="0.7" fill="white"/>
          <ellipse cx="17" cy="26" rx="3" ry="1.5" fill="#f9a8d4" opacity="0.5"/>
          <ellipse cx="31" cy="26" rx="3" ry="1.5" fill="#f9a8d4" opacity="0.5"/>
          <path d="M20.5 29 Q24 32 27.5 29" stroke="#e07070" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="sidebar__username">&#64;Usuario</span>
    </div>

    <nav class="sidebar__nav">
      <a routerLink="/home" routerLinkActive="sidebar__link--active"
         [routerLinkActiveOptions]="{ exact: true }" class="sidebar__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        Inicio
      </a>

      <a routerLink="/perfil" routerLinkActive="sidebar__link--active" class="sidebar__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Mi Perfil
      </a>

      <a routerLink="/tasks" routerLinkActive="sidebar__link--active" class="sidebar__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Mis Tareas
      </a>

      <a routerLink="/productividad" routerLinkActive="sidebar__link--active" class="sidebar__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Productividad
      </a>

      <a routerLink="/asistente-ia" routerLinkActive="sidebar__link--active" class="sidebar__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="14" rx="2"/>
          <path d="M8 21l4-4 4 4"/>
          <circle cx="9" cy="10" r="1" fill="currentColor"/>
          <circle cx="12" cy="10" r="1" fill="currentColor"/>
          <circle cx="15" cy="10" r="1" fill="currentColor"/>
        </svg>
        Asistente IA
      </a>

      <a routerLink="/notificaciones" routerLinkActive="sidebar__link--active" class="sidebar__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        Notificaciones
        <span class="sidebar__badge">3</span>
      </a>

      <a routerLink="/configuracion" routerLinkActive="sidebar__link--active" class="sidebar__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        Configuración
      </a>
    </nav>

    <button class="sidebar__logout" type="button" (click)="auth.logout()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Cerrar Sesión
    </button>

  </aside>

  <!-- ── Main area ───────────────────────────────────── -->
  <div class="app-main">

    <header class="app-header">
      <div class="app-header__left">
        <span class="app-header__logo">TM</span>
        <nav class="app-header__nav">
          <a routerLink="/home" class="app-header__nav-link" routerLinkActive="app-header__nav-link--active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
          <a routerLink="/tasks" class="app-header__nav-link" routerLinkActive="app-header__nav-link--active">Mis Tareas</a>
          <a routerLink="/productividad" class="app-header__nav-link" routerLinkActive="app-header__nav-link--active">Productividad</a>
          <a routerLink="/asistente-ia" class="app-header__nav-link" routerLinkActive="app-header__nav-link--active">Asistente IA</a>
        </nav>
      </div>

      <div class="app-header__right">
        <form class="app-header__search" (submit)="$event.preventDefault()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="search" placeholder="Buscar tareas..." aria-label="Buscar"/>
        </form>

        <a routerLink="/tasks/new" class="btn-new-task">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nueva Tarea
        </a>

        <div class="header-avatar" aria-hidden="true">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="18" fill="#252545"/>
            <ellipse cx="18" cy="20" rx="11" ry="13" fill="#ec4899"/>
            <circle cx="18" cy="17" r="8" fill="#fde8d8"/>
            <ellipse cx="18" cy="9.5" rx="9" ry="6" fill="#ec4899"/>
            <ellipse cx="8.5" cy="18" rx="3" ry="6" fill="#ec4899"/>
            <ellipse cx="27.5" cy="18" rx="3" ry="6" fill="#ec4899"/>
            <circle cx="15" cy="17" r="1.5" fill="#1a1a2e"/>
            <circle cx="21" cy="17" r="1.5" fill="#1a1a2e"/>
            <circle cx="15.6" cy="16.4" r="0.5" fill="white"/>
            <circle cx="21.6" cy="16.4" r="0.5" fill="white"/>
            <path d="M15.5 21 Q18 23 20.5 21" stroke="#e07070" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </header>

    <main class="app-content">
      <ng-content />
    </main>

  </div>
</div>
