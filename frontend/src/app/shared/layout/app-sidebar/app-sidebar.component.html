<aside
  class="app-sidebar"
  [class.app-sidebar--expanded]="panelOpen()"
  [attr.aria-label]="nav().aria"
>
  <header class="app-sidebar__head">
    <span class="app-sidebar__logo-mark" aria-hidden="true">TM</span>
    <div class="app-sidebar__head-text">
      <span class="app-sidebar__head-title">{{ nav().brandTitle }}</span>
      <span class="app-sidebar__head-kicker">{{ nav().menuKicker }}</span>
    </div>
    @if (narrow()) {
      <button
        type="button"
        class="app-sidebar__menu-toggle"
        (click)="toggleMenuPanel()"
        [attr.aria-expanded]="menuExpanded()"
        [attr.aria-label]="menuExpanded() ? nav().closeMenu : nav().openMenu"
        aria-controls="sidebar-panel"
      >
        @if (menuExpanded()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="m18 15-6-6-6 6" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="m6 9 6 6 6-6" />
          </svg>
        }
      </button>
    }
  </header>

  <div id="sidebar-panel" class="app-sidebar__body">
  <section class="app-sidebar__section" aria-labelledby="sidebar-main-title">
    <h2 id="sidebar-main-title" class="app-sidebar__section-title">{{ nav().sectionMain }}</h2>
    <nav class="app-sidebar__nav" [attr.aria-label]="nav().sectionMain">
      <a
        routerLink="/perfil"
        class="app-sidebar__link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="app-sidebar__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </span>
        <span class="app-sidebar__label">{{ nav().profile }}</span>
      </a>
      <a
        routerLink="/dashboard"
        class="app-sidebar__link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="app-sidebar__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
          </svg>
        </span>
        <span class="app-sidebar__label">{{ nav().calendar }}</span>
      </a>
      <a routerLink="/tasks" class="app-sidebar__link" routerLinkActive="active">
        <span class="app-sidebar__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4" />
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
          </svg>
        </span>
        <span class="app-sidebar__label">{{ nav().tasks }}</span>
      </a>
      <a
        routerLink="/mi-productividad"
        class="app-sidebar__link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="app-sidebar__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3v18h18" />
            <path d="M18 17V9" />
            <path d="M13 17V5" />
            <path d="M8 17v-3" />
          </svg>
        </span>
        <span class="app-sidebar__label">{{ nav().productivity }}</span>
      </a>
      <a
        routerLink="/mi-asistente-ia"
        class="app-sidebar__link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="app-sidebar__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="4" y="4" width="16" height="16" rx="2" />
            <path d="M9 9h6v6H9z" />
            <path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M1 9h3M20 15h3M1 15h3" />
          </svg>
        </span>
        <span class="app-sidebar__label">{{ nav().ai }}</span>
      </a>
      <a
        routerLink="/mi-notificaciones"
        class="app-sidebar__link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="app-sidebar__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </span>
        <span class="app-sidebar__label">{{ nav().notifications }}</span>
      </a>
    </nav>
  </section>

  <section class="app-sidebar__section app-sidebar__section--account" aria-labelledby="sidebar-account-title">
    <h2 id="sidebar-account-title" class="app-sidebar__section-title">{{ nav().sectionAccount }}</h2>
    <nav class="app-sidebar__nav app-sidebar__nav--bottom" [attr.aria-label]="nav().sectionAccount">
      <a
        routerLink="/mi-configuracion"
        class="app-sidebar__link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="app-sidebar__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
        </span>
        <span class="app-sidebar__label">{{ nav().settings }}</span>
      </a>
      <button type="button" class="app-sidebar__logout" (click)="auth.logout()">
        <span class="app-sidebar__icon app-sidebar__icon--logout" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </span>
        <span class="app-sidebar__label">{{ nav().logout }}</span>
      </button>
    </nav>
  </section>
  </div>
</aside>
