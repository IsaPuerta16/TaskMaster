<header class="header">
  <a routerLink="/" class="logo">TM</a>
  <nav class="nav">
    <a routerLink="/" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Inicio
    </a>
    <a routerLink="/funcionalidades" class="nav-link" routerLinkActive="active">Funcionalidades</a>
    <a routerLink="/productividad" class="nav-link" routerLinkActive="active">Productividad</a>
    <a routerLink="/asistente-ia" class="nav-link" routerLinkActive="active">Asistente IA</a>
    <a routerLink="/nosotros" class="nav-link" routerLinkActive="active">Nosotros</a>
  </nav>
  <form class="search-bar" (submit)="$event.preventDefault(); goSearch()" role="search" aria-label="Buscar en el sitio">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8" />
      <path d="m21 21-4.35-4.35" />
    </svg>
    <input
      type="search"
      name="q"
      placeholder="Buscar..."
      autocomplete="off"
      [value]="search.query()"
      (input)="search.setQuery($any($event.target).value)"
      aria-label="Término de búsqueda"
    />
  </form>
  <a
    [routerLink]="auth.isAuthenticated() ? '/dashboard' : '/login'"
    class="user-icon"
    [attr.aria-label]="auth.isAuthenticated() ? 'Mi cuenta' : 'Iniciar sesión'"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
      <circle cx="12" cy="7" r="4" />
    </svg>
  </a>
</header>
